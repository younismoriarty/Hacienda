version: '3.9'

services:
  landing-page:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: landing-page
    ports:
      - '8080:80'
    restart: unless-stopped
    volumes:
      # Optional: mount for live editing during development
      # Uncomment the lines below for hot-reload during development
      # - ./index.html:/usr/share/nginx/html/index.html:ro
      # - ./thank-you.html:/usr/share/nginx/html/thank-you.html:ro
      # - ./css:/usr/share/nginx/html/css:ro
      # - ./js:/usr/share/nginx/html/js:ro
      # - ./images:/usr/share/nginx/html/images:ro
      []
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - landing-net

networks:
  landing-net:
    driver: bridge
